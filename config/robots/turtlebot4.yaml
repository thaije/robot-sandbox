# Turtlebot 4 robot configuration
# Topic names verified against: turtlebot4_simulator (jazzy branch)

platform: "turtlebot4"

model:
  urdf: "robots/turtlebot4/urdf/turtlebot4.urdf.xacro"
  # SDF generated by ros_gz during launch — do not edit directly

sensors:
  rgb_camera:
    topic: "/oakd/rgb/preview/image_raw"
    msg_type: "sensor_msgs/Image"
    frame_id: "oakd_rgb_camera_optical_frame"
    # Co-locate boundingbox_camera sensor here for ground-truth detection
  lidar_2d:
    topic: "/scan"
    msg_type: "sensor_msgs/LaserScan"
    frame_id: "rplidar_link"
    range_max: 12.0  # RPLIDAR A1 spec
  imu:
    topic: "/imu"
    msg_type: "sensor_msgs/Imu"
    frame_id: "imu_link"
  bumper:
    topic: "/bumper_contact"       # verify on first launch (Step 2.1)
    msg_type: "gazebo_msgs/ContactsState"

control:
  cmd_vel_topic: "/cmd_vel"
  msg_type: "geometry_msgs/Twist"
  max_linear_speed: 0.31   # m/s (Create 3 spec)
  max_angular_speed: 1.90  # rad/s

odometry:
  topic: "/odom"
  msg_type: "nav_msgs/Odometry"

ground_truth:
  pose_topic: "/model/turtlebot4/pose"   # from ros_gz_bridge
  msg_type: "tf2_msgs/TFMessage"

detection:
  ground_truth_topic: "/ground_truth/detections"
  unified_topic: "/detections"
  msg_type: "vision_msgs/Detection2DArray"
  # Class ID → name mapping; must match gz-sim-label-system plugin values in SDF
  class_map:
    1: "fire_extinguisher"
    2: "first_aid_kit"
    3: "hazard_sign"

spawn:
  default_pose:
    x: 1.0
    y: 1.0
    z: 0.0
    yaw: 0.0
