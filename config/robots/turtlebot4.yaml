# Turtlebot 4 robot configuration
# Topic names verified by: ros2 topic list with live turtlebot4_gz.launch.py (jazzy branch)

platform: "turtlebot4"

model:
  urdf: "robots/turtlebot4/urdf/turtlebot4.urdf.xacro"
  # SDF generated by ros_gz during launch — do not edit directly

sensors:
  rgb_camera:
    topic: "/oakd/rgb/preview/image_raw"
    msg_type: "sensor_msgs/Image"
    frame_id: "oakd_rgb_camera_optical_frame"
    # Co-locate boundingbox_camera sensor here for ground-truth detection
  lidar_2d:
    topic: "/scan"
    msg_type: "sensor_msgs/LaserScan"
    frame_id: "rplidar_link"
    range_max: 12.0  # RPLIDAR A1 spec
  imu:
    topic: "/imu"
    msg_type: "sensor_msgs/Imu"
    frame_id: "imu_link"
    # NOTE: /imu is NOT published by default in turtlebot4_gz_bringup.
    # Requires adding a ros_gz_bridge for the IMU sensor topic (Step 2.3).
  bumper:
    topic: "/bumper_contact"
    msg_type: "ros_gz_interfaces/msg/Contacts"  # confirmed from create3_ros_gz_bridge.launch.py

control:
  cmd_vel_topic: "/cmd_vel"
  msg_type: "geometry_msgs/TwistStamped"  # bridge expects TwistStamped, not Twist
  cmd_vel_unstamped_topic: "/cmd_vel_unstamped"  # plain Twist alternative (also available)
  teleop_flag: "--ros-args -p stamped:=true"  # required for teleop_twist_keyboard
  max_linear_speed: 0.31   # m/s (Create 3 spec)
  max_angular_speed: 1.90  # rad/s

odometry:
  topic: "/odom"
  msg_type: "nav_msgs/Odometry"

ground_truth:
  pose_topic: "/sim_ground_truth_pose"  # verified: ros2 topic list (jazzy TB4 sim)
  dock_pose_topic: "/sim_ground_truth_dock_pose"
  msg_type: "tf2_msgs/TFMessage"

detection:
  ground_truth_topic: "/ground_truth/detections"
  unified_topic: "/detections"
  msg_type: "vision_msgs/Detection2DArray"
  # Class ID → name mapping; must match gz-sim-label-system plugin values in SDF
  class_map:
    1: "fire_extinguisher"
    2: "first_aid_kit"
    3: "hazard_sign"

spawn:
  default_pose:
    x: 1.0
    y: 1.0
    z: 0.0
    yaw: 0.0
