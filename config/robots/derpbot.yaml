# DerpBot robot configuration
# Simple two-wheeled differential drive robot — ARST Phase 1 baseline.

platform: "derpbot"

model:
  urdf: "robots/derpbot/urdf/derpbot.urdf"

dimensions:
  body_length: 0.30   # m
  body_width:  0.20   # m
  body_height: 0.10   # m
  wheel_radius: 0.05  # m
  wheel_separation: 0.1725  # m — calibrated effective kinematic track width (geometric is 0.23 m centre-to-centre, but Gazebo contact physics yields 0.1725 m effective)

control:
  cmd_vel_topic: "/derpbot_0/cmd_vel"   # namespace matches spawn name
  msg_type: "geometry_msgs/Twist"
  max_linear_speed: 0.5    # m/s
  max_angular_speed: 2.0   # rad/s

odometry:
  topic: "/derpbot_0/odom"
  msg_type: "nav_msgs/Odometry"

joint_states:
  topic: "/derpbot_0/joint_states"
  msg_type: "sensor_msgs/JointState"

# Ground-truth pose via ros_gz_bridge (for metrics, not the robot)
ground_truth:
  pose_topic: "/model/derpbot_0/pose"
  msg_type: "geometry_msgs/Pose"

sensors:
  lidar:
    type: "gpu_lidar"
    topic: "/derpbot_0/scan"
    msg_type: "sensor_msgs/LaserScan"
    frame_id: "lidar_link"
    update_rate: 10       # Hz
    range_min: 0.15       # m
    range_max: 12.0       # m
    samples: 720          # rays per scan (0.5° resolution)
    fov: 360              # degrees
  imu:
    type: "imu"
    topic: "/derpbot_0/imu"
    msg_type: "sensor_msgs/Imu"
    frame_id: "imu_link"
    update_rate: 100      # Hz

spawn:
  default_name: "derpbot_0"
  default_pose:
    x: 1.0
    y: 1.0
    z: 0.0    # base_footprint at ground; wheels rest on floor
    yaw: 0.0
