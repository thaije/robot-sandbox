scenario:
  name: "office_explore_detect_001"
  description: "Explore an office environment and find all target objects"
  timeout_seconds: 600
  random_seed: 42

world:
  template: "indoor_office"
  variant: "medium_clutter"
  size: "20x15"  # meters
  objects:
    - type: "fire_extinguisher"
      count: 3
      placement: "random"
    - type: "first_aid_kit"
      count: 2
      placement: "random"
    - type: "hazard_sign"
      count: 4
      placement: "random"
  variations:
    lighting: "normal"       # normal | dim | bright
    door_states: "random"    # open | closed | random

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      x: 1.0
      y: 1.0
      z: 0.0
      yaw: 0.0

metrics:
  collect:
    - meters_traveled
    - time_to_all_detections
    - task_completion_time
    - average_time_per_detection
    - exploration_coverage
    - object_detection_rate
    - false_positive_rate
    - collision_count
    - near_miss_count
    - revisit_ratio

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "object_detection_rate"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.25
    accuracy: 0.30
    safety: 0.20
    efficiency: 0.25
  par_values:
    time_per_detection_par: 60.0     # seconds per object
    coverage_rate_par: 2.0           # percent per second
    coverage_per_meter_par: 1.5      # percent per meter
    near_miss_threshold: 0.3         # meters
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
