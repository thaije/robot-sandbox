scenario:
  name: "integration_test_001"
  description: "Integration test — scripted movement verifies all metrics fire end-to-end"
  timeout_seconds: 90

world:
  template: "indoor_office"
  variations:
    lighting: "normal"
    door_states: "open"
  objects:
    - type: "fire_extinguisher"
      count: 1
      placement: "random"
      mission_target: true

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      x: 4.0
      y: 8.0
      z: 0.0
      yaw: 0.0

metrics:
  collect:
    - meters_traveled
    - task_completion_time
    - exploration_coverage
    - found_ratio
    - precision
    - duplicate_rate
    - mean_localization_error
    - collision_count
    - near_miss_count

success_criteria:
  mode: "any_of"
  conditions:
    - metric: "meters_traveled"
      operator: ">="
      value: 9999
      description: "Never passes — scenario runs to timeout"

scoring:
  category_weights:
    speed: 0.20
    accuracy: 0.30
    safety: 0.25
    efficiency: 0.10
    effectiveness: 0.15
  par_values: {}
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: false
  include_detection_log: false
  include_scorecard: false
