scenario:
  name: "office_brutal_001"
  description: "Brutal office exploration — flickering dim lights, closed doors, patrol bot, vertical objects, tight timeout"
  timeout_seconds: 180

world:
  template: "indoor_office"
  variations:
    lighting: "dim_localized"
    door_states: "closed"
    flicker:
      - name: "light_corridor"
        period_s: 1.5
  objects:
    - type: "fire_extinguisher"
      count: 2
      placement: "random"
      surface: "desk"
    - type: "fire_extinguisher"
      count: 1
      placement: "random"
    - type: "first_aid_kit"
      count: 1
      placement: "random"
      surface: "cabinet"
    - type: "first_aid_kit"
      count: 1
      placement: "random"
    - type: "hazard_sign"
      count: 1
      placement: "random"
    - type: "hazard_sign"
      count: 3
      placement: "random"
  dynamic_obstacles:
    - model: "patrol_bot"
      name: "patrol_bot_0"
      # z=0.14: wheels at z=-0.04 from model origin, radius 0.10 m → bottom at z=0
      # spawn at first waypoint so dead-reckoning leg lengths are correct
      spawn: [2.0, 8.0, 0.14]
      patrol: [[2.0, 8.0], [18.0, 8.0]]
      speed: 0.4
      turn_speed: 0.6

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      random: true
      zones: ["office_a", "office_b", "corridor", "meeting_room"]  # brutal: any room

metrics:
  collect:
    - meters_traveled
    - task_completion_time
    - exploration_coverage
    - found_ratio
    - precision
    - duplicate_rate
    - mean_localization_error
    - collision_count
    - near_miss_count

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "found_ratio"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.30
    accuracy: 0.25
    safety: 0.20
    efficiency: 0.10
    effectiveness: 0.15
  effectiveness_weights:
    fire_extinguisher: 40
    first_aid_kit: 40
    hazard_sign: 20
  par_values:
    completion_time_par: 103.2   # baseline avg (n=3)
    path_length_par: 38.9       # baseline avg (n=3)
    coverage_per_meter_par: 2.46 # baseline avg (n=3)
    near_miss_threshold: 0.3
  collision_thresholds: [0, 1, 3, 6]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
