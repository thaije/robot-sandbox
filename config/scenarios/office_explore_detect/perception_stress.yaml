scenario:
  name: "office_perception_stress_001"
  description: "Perception stress test — flicker red emergency lighting, smoke, fast patrol bot, cornered hazard signs"
  timeout_seconds: 600

world:
  template: "indoor_office"
  variations:
    lighting: "flicker_red_emergency"
    door_states: "random"
    flicker:
      - name: "light_corridor_emergency"
        period_s: 0.8
  objects:
    - type: "fire_extinguisher"
      count: 1
      placement: "random"
      surface: "desk"
    - type: "fire_extinguisher"
      count: 2
      placement: "random"
    - type: "first_aid_kit"
      count: 1
      placement: "random"
      z_offset: 0.1
    - type: "first_aid_kit"
      count: 1
      placement: "random"
    - type: "hazard_sign"
      count: 4
      placement: "cornered"
  dynamic_obstacles:
    - model: "patrol_bot"
      name: "patrol_bot_0"
      # spawn at first waypoint so dead-reckoning leg lengths are correct
      spawn: [2.0, 8.0, 0.14]
      patrol: [[2.0, 8.0], [18.0, 8.0]]
      speed: 0.5
      turn_speed: 0.8
    - model: "smoke_emitter"
      name: "smoke_corridor"
      spawn: [9.5, 8.2, 0.8]
      rate: 15
      lifetime: 5.0
      size: [1.5, 2.0, 1.0]

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      random: true
      zones: ["office_a", "office_b", "corridor", "meeting_room"]  # stress: any room

metrics:
  collect:
    - meters_traveled
    - time_to_all_detections
    - task_completion_time
    - average_time_per_detection
    - exploration_coverage
    - object_detection_rate
    - false_positive_rate
    - collision_count
    - near_miss_count
    - revisit_ratio

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "object_detection_rate"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.20
    accuracy: 0.35
    safety: 0.20
    efficiency: 0.10
    effectiveness: 0.15
  effectiveness_weights:
    fire_extinguisher: 40
    first_aid_kit: 40
    hazard_sign: 20
  par_values:
    time_per_detection_par: 80.0
    coverage_rate_par: 1.8
    coverage_per_meter_par: 1.3
    near_miss_threshold: 0.3
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
