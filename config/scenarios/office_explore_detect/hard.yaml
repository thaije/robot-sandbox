scenario:
  name: "office_hard_001"
  description: "Hard office exploration — dim localized lighting, closed doors, vertical objects, far spawn"
  timeout_seconds: 300

world:
  template: "indoor_office"
  variations:
    lighting: "dim_localized"
    door_states: "closed"
  objects:
    # ── Mission targets (scored) ──────────────────────────────────────────────
    - type: "fire_extinguisher"
      count: 2
      placement: "random"
      surface: "desk"
      mission_target: true
    - type: "fire_extinguisher"
      count: 1
      placement: "random"
      mission_target: true
    - type: "first_aid_kit"
      count: 2
      placement: "random"
      mission_target: true
    - type: "exit_sign"
      count: 3
      placement: "above_door"
      mission_target: true
    # ── Environmental objects (not scored) ────────────────────────────────────
    - type: "trash_can"
      count: 1
      placement: "random"
    - type: "person"
      count: 1
      placement: "random"
    - type: "drink_can"
      count: 1
      placement: "random"
      surface: "desk"
    - type: "drill"
      count: 1
      placement: "random"

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      random: true
      zones: ["office_a", "office_b", "corridor", "meeting_room"]  # hard: any room

metrics:
  collect:
    - meters_traveled
    - task_completion_time
    - exploration_coverage
    - found_ratio
    - precision
    - duplicate_rate
    - mean_localization_error
    - collision_count
    - near_miss_count

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "found_ratio"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.25
    accuracy: 0.30
    safety: 0.20
    efficiency: 0.10
    effectiveness: 0.15
  effectiveness_weights:
    fire_extinguisher: 40
    first_aid_kit: 40
    exit_sign: 20
  par_values:
    completion_time_par: 101.6  # baseline avg (n=4)
    path_length_par: 38.1       # baseline avg (n=4)
    coverage_per_meter_par: 2.23 # baseline avg (n=4)
    near_miss_threshold: 0.2
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
