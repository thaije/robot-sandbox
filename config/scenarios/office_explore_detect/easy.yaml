scenario:
  name: "office_easy_001"
  description: "Easy office exploration — bright lighting, open doors, comfortable timeout"
  timeout_seconds: 900

world:
  template: "indoor_office"
  variations:
    lighting: "bright"
    door_states: "open"
  objects:
    - type: "fire_extinguisher"
      count: 3
      placement: "random"
    - type: "first_aid_kit"
      count: 2
      placement: "random"
    - type: "hazard_sign"
      count: 4
      placement: "random"

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      x: 1.0
      y: 1.0
      z: 0.0
      yaw: 0.0

metrics:
  collect:
    - meters_traveled
    - time_to_all_detections
    - task_completion_time
    - average_time_per_detection
    - exploration_coverage
    - object_detection_rate
    - false_positive_rate
    - collision_count
    - near_miss_count
    - revisit_ratio

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "object_detection_rate"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.20
    accuracy: 0.30
    safety: 0.25
    efficiency: 0.10
    effectiveness: 0.15
  effectiveness_weights:
    fire_extinguisher: 40
    first_aid_kit: 40
    hazard_sign: 20
  par_values:
    time_per_detection_par: 45.0
    coverage_rate_par: 2.5
    coverage_per_meter_par: 1.5
    near_miss_threshold: 0.3
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
