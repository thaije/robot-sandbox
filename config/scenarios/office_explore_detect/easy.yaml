scenario:
  name: "office_easy_001"
  description: "Easy office exploration — bright lighting, open doors, comfortable timeout"
  timeout_seconds: 900

world:
  template: "indoor_office"
  variations:
    lighting: "bright"
    door_states: "open"
  objects:
    # ── Mission targets (scored) ──────────────────────────────────────────────
    - type: "fire_extinguisher"
      count: 3
      placement: "random"
      mission_target: true
    - type: "first_aid_kit"
      count: 2
      placement: "random"
      mission_target: true
    - type: "exit_sign"
      count: 4
      placement: "above_door"
    # ── Environmental objects (not scored, add visual variety) ────────────────
    - type: "trash_can"
      count: 1
      placement: "random"
    - type: "office_chair"
      count: 2
      placement: "random"
    - type: "person"
      count: 1
      placement: "random"
      mission_target: true
    - type: "drink_can"
      count: 1
      placement: "random"
      surface: "desk"
    - type: "drill"
      count: 1
      placement: "random"
    - type: "suitcase"
      count: 1
      placement: "cornered"

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      random: true
      zones: ["office_a"]   # easy: always start in Office A (bright, open)

metrics:
  collect:
    - meters_traveled
    - task_completion_time
    - exploration_coverage
    - found_ratio
    - precision
    - duplicate_rate
    - mean_localization_error
    - collision_count
    - near_miss_count

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "found_ratio"
      operator: ">="
      value: 1.0
      description: "All target objects must be detected"

scoring:
  category_weights:
    speed: 0.20
    accuracy: 0.30
    safety: 0.25
    efficiency: 0.10
    effectiveness: 0.15
  effectiveness_weights:
    fire_extinguisher: 40
    first_aid_kit: 40
    person: 20
  par_values:
    completion_time_par: 91.1   # baseline avg (n=4)
    path_length_par: 36.4       # baseline avg (n=4)
    coverage_per_meter_par: 2.24 # baseline avg (n=4)
    near_miss_threshold: 0.2
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true
