scenario:
  name: "basement_find_easy"
  description: "Easy basement proximity — bright lighting, find and detect the drink can"
  timeout_seconds: 300
  goal_type: "proximity"
  target_object: "drink_can"
  proximity_radius: 1.0

world:
  template: "basement"
  variations:
    lighting: "bright"
    door_states: "open"
  objects:
    # ── Primary target (mission) ────────────────────────────────────────
    - type: "drink_can"
      count: 1
      placement: "cornered"
      mission_target: true
    # ── Clutter (positions shuffle with seed) ───────────────────────────
    - type: "mouse"
      count: 1
      placement: "cornered"

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      random: true
      zones: ["room_1"]

metrics:
  collect:
    - meters_traveled
    - task_completion_time
    - exploration_coverage
    - collision_count
    - near_miss_count
    - proximity_tracker
    - found_ratio
    - precision
    - false_positive_count

success_criteria:
  mode: "all_of"
  conditions:
    - metric: "proximity_reached"
      operator: "=="
      value: true
      description: "Robot must reach within 1m of the drink can"
    - metric: "found_ratio"
      operator: ">="
      value: 1.0
      description: "Robot must detect the target object (true positive confirmed)"

scoring:
  category_weights:
    success: 0.30
    time: 0.25
    safety: 0.20
    efficiency: 0.25
  par_values:
    completion_time_par: 60.0
    near_miss_threshold: 0.2
  collision_thresholds: [0, 2, 5, 10]
  collision_scores: [100, 80, 60, 40, 20]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: true
  include_detection_log: true
  include_scorecard: true