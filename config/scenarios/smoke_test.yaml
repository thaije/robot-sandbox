scenario:
  name: "smoke_test_001"
  description: "Smoke transparency test — robot looks through smoke at object"
  timeout_seconds: 300

world:
  template: "indoor_office"
  variations:
    lighting: "normal"
    door_states: "open"
  objects:
    - type: "fire_extinguisher"
      count: 1
      placement: "random"
    - type: "hazard_sign"
      count: 1
      placement: "random"
  dynamic_obstacles:
    - model: "smoke_emitter"
      name: "smoke_test"
      # Wide cloud centred in corridor — covers most of the cross-section
      spawn: [9.5, 8.2, 0.8]
      rate: 15
      lifetime: 5.0
      # 3x the previous 0.5m test box → 1.5 m emitter footprint
      size: [1.5, 2.0, 1.0]

robots:
  - platform: "derpbot"
    name: "derpbot_0"
    spawn_pose:
      x: 4.0
      y: 8.0
      z: 0.0
      yaw: 0.0   # facing east, 5.5 m from smoke centre

metrics:
  collect:
    - meters_traveled

success_criteria:
  mode: "any_of"
  conditions:
    - metric: "meters_traveled"
      operator: ">="
      value: 9999
      description: "Never passes — scenario runs until timeout"

scoring:
  category_weights:
    speed: 1.0
    accuracy: 0.0
    safety: 0.0
    efficiency: 0.0
    effectiveness: 0.0
  par_values: {}
  collision_thresholds: [0]
  collision_scores: [100]
  grade_thresholds:
    S: 95
    A: 85
    B: 70
    C: 55
    D: 40

output:
  format: "json"
  directory: "./results/"
  include_trajectory: false
  include_detection_log: false
  include_scorecard: false
