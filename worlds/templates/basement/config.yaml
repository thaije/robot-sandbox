# Basement world template configuration
template: "basement"
description: "Residential basement — single open space, low ceiling, cluttered"

dimensions:
  width: 12.0   # meters (x)
  depth: 8.0    # meters (y)

ground_truth_map:
  pgm: "worlds/templates/basement/ground_truth_map.pgm"
  yaml: "worlds/templates/basement/ground_truth_map.yaml"

# Valid zones for random object placement (bounding boxes, world frame)
placement_zones:
  - id: "workshop"
    x_min: 1.0
    x_max: 5.5
    y_min: 1.0
    y_max: 7.0
  - id: "storage"
    x_min: 6.5
    x_max: 11.0
    y_min: 1.0
    y_max: 7.0

# Full room extents — single space, no doors
rooms:
  - id: "basement"
    x_min: 0.2
    x_max: 11.8
    y_min: 0.2
    y_max: 7.8

# Pre-validated robot spawn poses
spawn_poses:
  basement:
    - {x: 1.0, y: 1.0, yaw: 0.0}
    - {x: 1.5, y: 4.0, yaw: 0.0}
    - {x: 2.0, y: 2.0, yaw: 1.5708}

# Minimum clearance from walls / other objects
placement_clearance: 0.5

# Static obstacles (furniture) — positions match world.sdf
obstacles:
  - {name: shelf_unit,      x: 0.6,  y: 2.5,  w: 0.8,  h: 0.4,  surface_height: 0.90, surface_class: shelf}
  - {name: workbench,       x: 3.5,  y: 6.0,  w: 2.0,  h: 0.8,  surface_height: 0.90, surface_class: table}
  - {name: cardboard_box_1, x: 9.5,  y: 3.0,  w: 0.5,  h: 0.4}
  - {name: cardboard_box_2, x: 9.8,  y: 3.6,  w: 0.4,  h: 0.35}
  - {name: cardboard_box_3, x: 9.2,  y: 3.4,  w: 0.35, h: 0.3}
  - {name: tool_rack,       x: 5.0,  y: 0.3,  w: 1.5,  h: 0.15}
  - {name: pallet,          x: 4.5,  y: 1.5,  w: 1.2,  h: 1.0}

# No doors in the basement — single open space
doors: []

variants:
  - id: "standard"
    extra_objects: 0

lighting_presets:
  bright:
    ambient: [0.5, 0.48, 0.45, 1.0]
    diffuse: [0.9, 0.88, 0.85, 1.0]
    ceiling_color: [0.70, 0.68, 0.65, 1.0]
    background: [0.35, 0.33, 0.30, 1.0]
  dim:
    ambient: [0.12, 0.11, 0.10, 1.0]
    diffuse: [0.22, 0.20, 0.18, 1.0]
    ceiling_color: [0.15, 0.14, 0.12, 1.0]
    background: [0.08, 0.07, 0.06, 1.0]