# Basement world template configuration — Tjalling's actual basement
template: "basement"
description: "Residential basement — 3 rooms, 80cm ceiling, exposed pipes and conduits"

dimensions:
  width: 6.0    # meters (x, E-W)
  depth: 8.0    # meters (y, N-S)

ground_truth_map:
  pgm: "worlds/templates/basement/ground_truth_map.pgm"
  yaml: "worlds/templates/basement/ground_truth_map.yaml"

# Valid zones for random object placement (bounding boxes, world frame)
# Each room has its own placement zone (inside walls with margin)
placement_zones:
  - id: "room_1"
    x_min: 0.3
    x_max: 3.7
    y_min: 0.3
    y_max: 7.7
  - id: "room_2"
    x_min: 4.3
    x_max: 5.7
    y_min: 0.3
    y_max: 2.7
  - id: "room_3"
    x_min: 4.3
    x_max: 5.7
    y_min: 3.3
    y_max: 7.7

# Full room extents (inside walls)
rooms:
  - id: "room_1"
    x_min: 0.1
    x_max: 3.9
    y_min: 0.1
    y_max: 7.9
  - id: "room_2"
    x_min: 4.1
    x_max: 5.9
    y_min: 0.1
    y_max: 2.9
  - id: "room_3"
    x_min: 4.1
    x_max: 5.9
    y_min: 3.1
    y_max: 7.9

# Pre-validated robot spawn poses (checked against obstacle positions)
spawn_poses:
  room_1:
    - {x: 2.0, y: 4.0, yaw: 0.0}
    - {x: 1.5, y: 6.0, yaw: 1.5708}
    - {x: 3.0, y: 2.0, yaw: 0.0}

# Minimum clearance from walls / other objects
placement_clearance: 0.3

# Static obstacles (furniture + pillars) — positions match world.sdf
obstacles:
  - {name: cardboard_box_1, x: 0.8, y: 0.8, w: 0.3, h: 0.25}
  - {name: cardboard_box_2, x: 1.1, y: 1.0, w: 0.25, h: 0.2}
  - {name: cardboard_box_3, x: 0.6, y: 1.1, w: 0.2, h: 0.18}
  - {name: pillar_1, x: 2.0, y: 3.0, w: 0.2, h: 0.2}
  - {name: pillar_2, x: 2.0, y: 5.5, w: 0.2, h: 0.2}

# Door definitions for connectivity guarantee (passages between rooms)
doors:
  - id: "passage_r1_r2"
    x: 4.0
    y: 1.5
    orientation: "ns"
    width: 0.8
    connects: ["room_1", "room_2"]
  - id: "passage_r1_r3"
    x: 4.0
    y: 5.5
    orientation: "ns"
    width: 0.8
    connects: ["room_1", "room_3"]

variants:
  - id: "standard"
    extra_objects: 0

lighting_presets:
  bright:
    ambient: [0.6, 0.58, 0.55, 1.0]
    diffuse: [1.0, 0.95, 0.85, 1.0]
    ceiling_color: [0.80, 0.78, 0.75, 1.0]
    background: [0.5, 0.48, 0.45, 1.0]
  dim:
    ambient: [0.15, 0.13, 0.12, 1.0]
    diffuse: [0.35, 0.30, 0.25, 1.0]
    ceiling_color: [0.20, 0.18, 0.16, 1.0]
    background: [0.12, 0.10, 0.09, 1.0]