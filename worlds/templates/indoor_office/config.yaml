# Indoor office world template configuration
template: "indoor_office"
description: "Multi-room office with corridors, doors, and furniture"

dimensions:
  width: 20.0   # meters (x)
  depth: 15.0   # meters (y)

ground_truth_map:
  pgm: "worlds/templates/indoor_office/ground_truth_map.pgm"
  yaml: "worlds/templates/indoor_office/ground_truth_map.yaml"

# Valid zones for random object placement (bounding boxes, world frame)
placement_zones:
  - id: "office_a"
    x_min: 1.0
    x_max: 8.0
    y_min: 1.0
    y_max: 6.0
  - id: "office_b"
    x_min: 10.0
    x_max: 18.0
    y_min: 1.0
    y_max: 6.0
  - id: "corridor"
    x_min: 1.0
    x_max: 18.0
    y_min: 7.0
    y_max: 9.0
  - id: "meeting_room"
    x_min: 5.0
    x_max: 14.0
    y_min: 10.0
    y_max: 14.0

# Minimum clearance from walls / other objects
placement_clearance: 0.5  # meters

# Static obstacles (furniture) — rendered on agent maps; positions match world.sdf
# x,y = centre in world frame; w = x-axis extent (m); h = y-axis extent (m)
obstacles:
  # Office A
  - {name: desk_a1,    x: 4.5,  y: 1.5,  w: 1.4,  h: 0.7}
  - {name: chair_a1,   x: 4.5,  y: 2.4,  w: 0.45, h: 0.45}
  - {name: desk_a2,    x: 7.0,  y: 4.5,  w: 1.4,  h: 0.7}
  - {name: chair_a2,   x: 7.0,  y: 5.4,  w: 0.45, h: 0.45}
  - {name: cabinet_a,  x: 1.5,  y: 5.8,  w: 0.5,  h: 0.45}
  # Office B
  - {name: desk_b1,    x: 12.0, y: 1.5,  w: 1.4,  h: 0.7}
  - {name: chair_b1,   x: 12.0, y: 2.4,  w: 0.45, h: 0.45}
  - {name: desk_b2,    x: 17.0, y: 4.5,  w: 1.4,  h: 0.7}
  - {name: chair_b2,   x: 17.0, y: 5.4,  w: 0.45, h: 0.45}
  - {name: cabinet_b,  x: 19.2, y: 5.8,  w: 0.5,  h: 0.45}
  # Meeting Room
  - {name: conf_table,    x: 10.0, y: 12.0, w: 3.6,  h: 1.4}
  - {name: conf_chair_0,  x: 8.0,  y: 12.0, w: 0.45, h: 0.45}
  - {name: conf_chair_1,  x: 9.2,  y: 12.0, w: 0.45, h: 0.45}
  - {name: conf_chair_2,  x: 10.8, y: 12.0, w: 0.45, h: 0.45}
  - {name: conf_chair_3,  x: 12.0, y: 12.0, w: 0.45, h: 0.45}
  - {name: conf_chair_4,  x: 9.2,  y: 13.0, w: 0.45, h: 0.45}
  - {name: conf_chair_5,  x: 10.8, y: 13.0, w: 0.45, h: 0.45}

variants:
  - id: "low_clutter"
    extra_objects: 5
  - id: "medium_clutter"
    extra_objects: 15
  - id: "high_clutter"
    extra_objects: 30

lighting_presets:
  normal:
    ambient: [0.4, 0.4, 0.4, 1.0]
    diffuse: [0.8, 0.8, 0.8, 1.0]
  dim:
    ambient: [0.15, 0.15, 0.15, 1.0]
    diffuse: [0.3, 0.3, 0.3, 1.0]
  bright:
    ambient: [0.6, 0.6, 0.6, 1.0]
    diffuse: [1.0, 1.0, 1.0, 1.0]
